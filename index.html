<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Fourfold Resting</title>

  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#F7F5F0">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#111210">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Fourfold">

  <!-- Prevent flash of wrong theme when a saved preference differs from system -->
  <script>(function(){var t=localStorage.getItem('fourfold-theme');if(t)document.documentElement.dataset.theme=t})()</script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Lora:ital,wght@0,400;0,500;1,400&display=swap">

  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/typography.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>

  <header>
    <div class="container container--wide">
      <nav class="site-nav" aria-label="Site navigation">
        <a href="#/" class="nav-logo">The Fourfold Resting</a>
        <ul class="nav-links" role="list">
          <li><a href="#/">Practice</a></li>
          <li><a href="#/about">About</a></li>
        </ul>
        <button id="theme-toggle" class="btn btn--ghost btn--icon" aria-label="Switch to dark mode"></button>
      </nav>
    </div>
  </header>

  <main id="app" tabindex="-1"></main>

  <footer>
    <div class="container container--wide">
      <p>&copy; 2026 The Fourfold Resting &mdash; A science-based relaxation and presence practice</p>
    </div>
  </footer>

  <div id="aria-announcer" class="sr-only" aria-live="polite" aria-atomic="true"></div>

  <script type="module" src="js/theme.js"></script>
  <script type="module" src="js/main.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>

</body>
</html>
